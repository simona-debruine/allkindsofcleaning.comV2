version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*

# Proxy estimate enrichment through Amplify (must be before SPA catch-all).
# Also applied in Amplify Console customRules for app d1ty0s86yf7nk8.
redirects:
  - source: /api/property/enrich
    target: https://dw5oeyk23i76jm6zfuzeb6n6je0sedkh.lambda-url.us-east-1.on.aws/
    status: "200"
  - source: /api/property/enrich/
    target: https://dw5oeyk23i76jm6zfuzeb6n6je0sedkh.lambda-url.us-east-1.on.aws/
    status: "200"
  - source: "/<*>"
    target: "/index.html"
    status: "404-200"

customHeaders:
  - pattern: "/assets/**"
    headers:
      - key: Cache-Control
        value: "public, max-age=31536000, immutable"
  - pattern: "**/*.html"
    headers:
      - key: Cache-Control
        value: "no-cache"
  - pattern: "**/*"
    headers:
      - key: X-Content-Type-Options
        value: "nosniff"
      - key: X-Frame-Options
        value: "DENY"
      - key: Referrer-Policy
        value: "strict-origin-when-cross-origin"
